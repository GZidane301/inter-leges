<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inter Leges — Gabriel Zidane</title>
  <meta name="description" content="Ensaios sobre direito e filosofia por Gabriel Zidane.">
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --text-primary: #1a1a18; --text-secondary: #555550; --text-tertiary: #999990;
      --border-light: #e8e8e2; --border-mid: #ccccc4; --bg: #fafaf7; --bg-card: #ffffff; --radius: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root { --text-primary: #f0f0ec; --text-secondary: #aaaaaa; --text-tertiary: #666660;
        --border-light: #2a2a28; --border-mid: #3a3a38; --bg: #141412; --bg-card: #1e1e1c; }
    }
    body { font-family: 'Source Serif 4', Georgia, serif; background: var(--bg); color: var(--text-primary); font-size: 16px; line-height: 1.7; -webkit-font-smoothing: antialiased; }
    a { color: inherit; text-decoration: none; }
    .container { max-width: 860px; margin: 0 auto; padding: 0 1.5rem; }
    header { border-bottom: 1px solid var(--border-light); padding: 1.75rem 0; margin-bottom: 2.5rem; }
    nav { display: flex; justify-content: space-between; align-items: baseline; }
    .brand { display: flex; flex-direction: column; gap: 3px; }
    .brand-name { font-family: 'Playfair Display', Georgia, serif; font-size: 22px; font-weight: 400; font-style: italic; letter-spacing: -0.3px; }
    .brand-sub { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-tertiary); font-weight: 300; }
    .nav-links { display: flex; gap: 20px; list-style: none; }
    .nav-links a { font-size: 12px; color: var(--text-secondary); letter-spacing: 0.06em; text-transform: uppercase; font-weight: 300; }
    .article-label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-tertiary); font-weight: 300; margin-bottom: 0.75rem; display: block; }
    .hero-title { font-family: 'Playfair Display', Georgia, serif; font-size: clamp(28px, 5vw, 40px); font-weight: 400; line-height: 1.2; letter-spacing: -0.5px; max-width: 640px; margin-bottom: 1rem; }
    .hero-excerpt { font-size: 16px; font-weight: 300; line-height: 1.8; color: var(--text-secondary); max-width: 560px; margin-bottom: 1.25rem; }
    .hero-meta { display: flex; font-size: 13px; color: var(--text-tertiary); font-weight: 300; }
    .hero-meta span + span::before { content: '·'; margin: 0 10px; opacity: 0.5; }
    .read-link { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-primary); border-bottom: 1px solid var(--border-mid); padding-bottom: 1px; margin-top: 1.25rem; }
    .newsletter-box { display: flex; gap: 12px; align-items: center; margin-top: 2rem; padding: 1.25rem; border: 1px solid var(--border-light); border-radius: var(--radius); background: var(--bg-card); }
    .newsletter-box p { font-size: 14px; color: var(--text-secondary); font-weight: 300; flex: 1; line-height: 1.55; }
    .newsletter-box strong { font-weight: 500; color: var(--text-primary); display: block; margin-bottom: 2px; font-family: 'Playfair Display', serif; font-size: 15px; }
    .btn { font-size: 13px; padding: 8px 18px; border: 1px solid var(--border-mid); border-radius: 20px; background: none; color: var(--text-primary); cursor: pointer; white-space: nowrap; font-family: 'Source Serif 4', serif; font-weight: 300; }
    hr { border: none; border-top: 1px solid var(--border-light); margin: 2.5rem 0; }
    .section-label { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-tertiary); font-weight: 300; margin-bottom: 1.5rem; }
    .tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 2rem; }
    .tag { font-size: 12px; padding: 4px 14px; border: 1px solid var(--border-light); border-radius: 20px; color: var(--text-secondary); cursor: pointer; font-weight: 300; font-family: 'Source Serif 4', serif; }
    .tag.active { border-color: var(--border-mid); color: var(--text-primary); }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 2rem 2.5rem; }
    .card { display: flex; flex-direction: column; gap: 0.45rem; }
    .card-tag { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-tertiary); font-weight: 300; }
    .card-title { font-family: 'Playfair Display', Georgia, serif; font-size: 19px; font-weight: 400; line-height: 1.35; letter-spacing: -0.2px; }
    .card-excerpt { font-size: 14px; font-weight: 300; line-height: 1.7; color: var(--text-secondary); }
    .card-date { font-size: 12px; color: var(--text-tertiary); margin-top: 0.2rem; }
    footer { border-top: 1px solid var(--border-light); margin-top: 3rem; padding: 1.5rem 0 2rem; display: flex; justify-content: space-between; font-size: 13px; color: var(--text-tertiary); font-weight: 300; }
    @media (max-width: 600px) { .newsletter-box { flex-direction: column; align-items: flex-start; } }
  </style>
</head>

    <header>
      <nav>
        <div class="brand">
          <span class="brand-name">Inter Leges</span>
          <span class="brand-sub">por Gabriel Zidane</span>
        </div>
